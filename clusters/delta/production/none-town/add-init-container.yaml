apiVersion: apps/v1
kind: Deployment
metadata:
  name: none-town-deployment
  namespace: production
spec:
  template:
    spec:
      initContainers:
      - name: wait-for-mongo
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          until nc -z mongo-service 27017; do
            echo "Waiting for MongoDB..."
            sleep 2
          done
          echo "MongoDB is up!"