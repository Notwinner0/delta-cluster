apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "myca-cluster-issuer"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - auth.internal
    secretName: auth-tls-secret
  rules:
  - host: auth.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 443