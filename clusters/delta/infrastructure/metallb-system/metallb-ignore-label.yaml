apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: speaker
  namespace: metallb-system
spec:
  selector:
    matchLabels:
      app: metallb
      component: speaker
  template:
    spec:
      containers:
        - name: speaker
          env:
            - name: METALLB_IGNORE_EXCLUDE_LB
              value: "true"