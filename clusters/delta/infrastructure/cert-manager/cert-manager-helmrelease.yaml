apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  releaseName: cert-manager
  targetNamespace: cert-manager          # ← перенесено на уровень spec
  install:
    createNamespace: true
  chart:
    spec:
      chart: cert-manager
      version: 1.20.2
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
  interval: 5m
  values:
    crds:
      enabled: false                     # ← важно: CRD уже восстановлены вручную