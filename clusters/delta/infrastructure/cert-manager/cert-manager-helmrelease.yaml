apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  releaseName: cert-manager
  chart:
    spec:
    targetNamespace: cert-manager
    install:
      createNamespace: true
      chart: cert-manager
      version: 1.20.2
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
  interval: 5m
  values:
    crds:
      enabled: true
      keep: true