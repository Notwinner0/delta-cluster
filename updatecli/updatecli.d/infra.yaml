name: Update infra

scms:
  default:
    kind: github
    spec:
      owner: "Notwinner0"
      commitusingapi: true
      email: bot@updatecli.io
      repository: "delta-cluster"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GITHUB_ACTOR"}}'
      branch: "main"
      user: "updatecli"

sources:
  # get versions
  cert-managerVersion:
    name: Get latest cert-manager version
    kind: githubrelease
    spec:
      owner: "cert-manager"
      repository: "cert-manager"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: "*"
  ingress-nginxVersion:
    name: Get latest ingress-nginx version
    kind: githubrelease
    spec:
      owner: "kubernetes"
      repository: "ingress-nginx"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: regex
        pattern: 'controller-v(\d+\.\d+\.\d+)'
  local-path-provisionerVersion:
    name: Get latest local-path-provisioner version
    kind: githubrelease
    spec:
      owner: "rancher"
      repository: "local-path-provisioner"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: "*"
  sealed-secretsVersion:
    name: Get latest sealed-secrets version
    kind: githubrelease
    spec:
      owner: "bitnami-labs"
      repository: "sealed-secrets"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: "*"
  metallbVersion:
    name: Get latest metallb version
    kind: githubrelease
    spec:
      owner: "metallb"
      repository: "metallb"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: "*"
  # download
  cert-managerDownload:
    name: Download latest cert-manager
    kind: http
    dependson:
      - cert-managerVersion
    spec:
      url: 'https://github.com/cert-manager/cert-manager/releases/download/{{ source "cert-managerVersion" }}/cert-manager.yaml'
  ingress-nginxDownload:
    name: Download latest ingress-nginx
    kind: http
    dependson:
      - ingress-nginxVersion
    spec:
      url: 'https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-{{ source "ingress-nginxVersion" }}/deploy/static/provider/cloud/deploy.yaml'
  local-path-provisionerDownload:
    name: Download latest local-path-provisioner
    kind: http
    dependson:
      - local-path-provisionerVersion
    spec:
      url: 'https://raw.githubusercontent.com/rancher/local-path-provisioner/refs/tags/{{ source "local-path-provisionerVersion" }}/deploy/local-path-storage.yaml'
  sealed-secretsDownload:
    name: Download latest sealed-secrets
    kind: http
    dependson:
      - sealed-secretsVersion
    spec:
      url: 'https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ source "sealed-secretsVersion" }}/controller.yaml'
  metallbDownload:
    name: Download latest metallb
    kind: http
    dependson:
      - metallbVersion
    spec:
      url: 'https://raw.githubusercontent.com/metallb/metallb/refs/tags/{{ source "metallbVersion" }}/config/manifests/metallb-native.yaml'

targets:
  cert-managerReplace:
    name: Replace cert-manager.yaml with latest version
    kind: file
    scmid: default
    spec:
      file: "clusters/delta/infrastructure/cert-manager/cert-manager.yaml"
      content: '{{ source "cert-managerDownload" }}'
      forcecreate: true
  ingress-nginxReplace:
    name: Replace deploy.yaml with latest version
    kind: file
    scmid: default
    spec:
      file: "clusters/delta/infrastructure/ingress-nginx/deploy.yaml"
      content: '{{ source "ingress-nginxDownload" }}'
      forcecreate: true
  local-path-provisionerReplace:
    name: Replace local-path-storage.yaml with latest version
    kind: file
    scmid: default
    spec:
      file: "clusters/delta/infrastructure/local-path-storage/local-path-storage.yaml"
      content: '{{ source "local-path-provisionerDownload" }}'
      forcecreate: true
  sealed-secretsReplace:
    name: Replace controller.yaml with latest version
    kind: file
    scmid: default
    spec:
      file: "clusters/delta/infrastructure/sealed-secrets/controller.yaml"
      content: '{{ source "sealed-secretsDownload" }}'
      forcecreate: true
  metallbReplace:
    name: Replace metallb-native.yaml with latest version
    kind: file
    scmid: default
    spec:
      file: "clusters/delta/infrastructure/metallb-system/metallb-native.yaml"
      content: '{{ source "metallbDownload" }}'
      forcecreate: true
