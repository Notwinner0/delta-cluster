name: Update longhorn

scms:
  default:
    kind: "github"
    spec:
      owner: '{{ .scm.github.owner }}'
      commitusingapi: true
      email: '{{ .scm.github.email }}'
      repository: '{{ .scm.github.repository }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GITHUB_ACTOR"}}'
      branch: '{{ .scm.github.branch }}'
      user: '{{ .scm.github.user }}'

actions:
  default:
    title: 'chore(deps): replace longhorn to {{ source "longhornVersion" }}'
    kind: github/pullrequest
    scmid: default
    spec:
      automerge: false
      mergemethod: squash
      labels:
        - dependencies
        - automated

sources:
  longhornVersion:
    name: Get latest longhorn version
    kind: githubrelease
    spec:
      owner: "longhorn"
      repository: "longhorn"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: "*"
  longhornDownload:
    name: Download latest longhorn
    kind: http
    dependson:
      - longhornVersion
    spec:
      url: 'https://raw.githubusercontent.com/longhorn/longhorn/refs/tags/{{ source "longhornVersion" }}/deploy/longhorn.yaml'

targets:
  longhornReplace:
    name: Replace longhorn.yaml with latest version
    kind: file
    scmid: default
    sourceid: longhornDownload
    spec:
      file: "clusters/delta/infrastructure/longhorn-system/longhorn.yaml"
      forcecreate: true
