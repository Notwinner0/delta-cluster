name: Update sealed-secrets

scms:
  default:
    kind: "github"
    spec:
      owner: '{{ .scm.github.owner }}'
      commitusingapi: true
      email: '{{ .scm.github.email }}'
      repository: '{{ .scm.github.repository }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GITHUB_ACTOR"}}'
      branch: '{{ .scm.github.branch }}'
      user: '{{ .scm.github.user }}'

actions:
  default:
    title: 'chore(deps): replace sealed-secrets to {{ source "sealed-secretsVersion" }}'
    kind: github/pullrequest
    scmid: default
    spec:
      automerge: false
      mergemethod: squash
      labels:
        - dependencies
        - automated

sources:
  sealed-secretsVersion:
    name: Get latest sealed-secrets version
    kind: githubrelease
    spec:
      owner: "bitnami-labs"
      repository: "sealed-secrets"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      versionfilter:
        kind: semver
        pattern: "*"
  sealed-secretsDownload:
    name: Download latest sealed-secrets
    kind: http
    dependson:
      - sealed-secretsVersion
    spec:
      url: 'https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ source "sealed-secretsVersion" }}/controller.yaml'


targets:
  sealed-secretsReplace:
    name: Replace controller.yaml with latest version
    kind: file
    scmid: default
    sourceid: sealed-secretsDownload
    spec:
      file: "clusters/delta/infrastructure/sealed-secrets/controller.yaml"
      forcecreate: true