name: Update cert-manager Helm chart

scms:
  default:
    kind: "github"
    spec:
      owner: '{{ .scm.github.owner }}'
      commitusingapi: true
      email: '{{ .scm.github.email }}'
      repository: '{{ .scm.github.repository }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GITHUB_ACTOR"}}'
      branch: '{{ .scm.github.branch }}'
      user: '{{ .scm.github.user }}'

actions:
  default:
    title: 'chore(deps): update cert-manager Helm chart to {{ source "cert-managerVersion" }}'
    kind: github/pullrequest
    scmid: default
    spec:
      automerge: false
      mergemethod: squash
      description: |
        ## Update cert-manager
        Automated update to version {{ source "cert-managerVersion" }}.
        
        [Changelog](https://github.com/cert-manager/cert-manager/releases/tag/{{ source "cert-managerVersion" }})
      labels:
        - dependencies
        - automated

sources:
  cert-managerVersion:
    name: Get latest cert-manager Helm chart version
    kind: helmchart
    spec:
      url: https://charts.jetstack.io
      name: cert-manager
      versionfilter:
        kind: semver
        pattern: "*"

targets:
  cert-managerHelmRelease:
    name: Update cert-manager HelmRelease version
    kind: yaml
    scmid: default
    sourceid: cert-managerVersion
    spec:
      file: "clusters/delta/infrastructure/cert-manager/cert-manager-helmrelease.yaml"
      key: "spec.chart.spec.version"